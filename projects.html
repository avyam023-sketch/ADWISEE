<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #2e2d7c;
    --pink: #e8186d;
    --beige: #f0e6d3;
    --off: #fafafa;
    --scroll-total: 0;
  }
  html {
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: rgba(46,45,124,0.15) transparent;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off);
    color: #222;
    min-height: 100vh;
    padding-top: 76px;
    overflow-x: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }
  .scroll-progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, var(--navy), var(--pink));
    z-index: 102;
    transform-origin: left;
    transform: scaleX(var(--scroll-total, 0));
    pointer-events: none;
  }
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 22px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(46,45,124,0.05);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                background 0.3s ease;
  }
  nav.nav-hidden { transform: translateY(-100%); }
  nav.nav-scrolled { background: rgba(255,255,255,0.95); }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    color: var(--navy);
  }
  .nav-links {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: clamp(16px, 2vw, 28px);
    align-items: center;
  }
  .nav-links a {
    text-decoration: none;
    color: #555;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: color 0.25s;
    position: relative;
  }
  .nav-links a:not(.nav-cta)::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--navy);
    transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav-links a:not(.nav-cta):hover::after { width: 100%; }
  .nav-links a:not(.nav-cta):hover { color: var(--navy); }
  .nav-links a.nav-cta {
    background: var(--navy);
    color: #fff !important;
    padding: 10px 24px;
    border-radius: 100px;
    transition: background 0.3s, transform 0.25s;
  }
  .nav-links a.nav-cta:hover { background: var(--pink); transform: translateY(-2px); }
  .nav-links a.is-active { color: var(--navy); font-weight: 600; }

  .projects-hero {
    padding: 56px 48px 48px;
    max-width: 1120px;
    margin: 0 auto;
  }
  .projects-hero__kicker {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--navy);
    opacity: 0.85;
    margin-bottom: 12px;
  }
  .projects-hero__title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 6vw, 4.2rem);
    line-height: 1.05;
    color: #111;
    letter-spacing: 0.02em;
    margin: 0;
  }
  .projects-hero__title em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--navy);
    font-weight: 400;
  }
  .reveal-lines .line {
    display: block;
    overflow: hidden;
    padding-bottom: 4px;
  }
  .reveal-lines .line-inner {
    display: block;
    transform: translateY(110%);
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .reveal-lines.visible .line-inner {
    transform: translateY(0);
  }
  .reveal-lines .line:nth-child(1) .line-inner { transition-delay: 0s; }
  .reveal-lines .line:nth-child(2) .line-inner { transition-delay: 0.1s; }
  .reveal-lines .line:nth-child(3) .line-inner { transition-delay: 0.2s; }

  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    transition-delay: calc(var(--d, 0) * 0.12s);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .projects-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px 80px;
  }
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }
  .project-slide {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(46, 45, 124, 0.1);
    box-shadow: 0 12px 36px rgba(0,0,0,0.06);
  }
  .project-slide--extra {
    display: none;
  }
  .projects-grid.is-expanded .project-slide--extra {
    display: block;
  }
  .project-slide__fig {
    margin: 0;
 }
  .project-slide__fig img {
    width: 100%;
    height: auto;
    display: block;
    aspect-ratio: 4 / 3;
    object-fit: cover;
  }

  .projects-actions {
    margin-top: 36px;
    text-align: center;
  }
  .projects-see-more {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 100px;
    border: 2px solid var(--navy);
    background: #fff;
    color: var(--navy);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .projects-see-more:hover {
    background: var(--navy);
    color: #fff;
  }
  .projects-see-more:focus-visible {
    outline: 2px solid var(--pink);
    outline-offset: 3px;
  }
  .projects-grid.is-expanded ~ .projects-actions .projects-see-more {
    display: none;
  }
  .projects-done {
    display: none;
    margin-top: 16px;
    font-size: 0.88rem;
    color: #666;
  }
  .projects-grid.is-expanded ~ .projects-actions .projects-done {
    display: block;
  }
  .projects-done.reveal {
    opacity: 0;
    transform: translateY(16px);
  }
  .projects-done.reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .footer {
    padding: 40px 48px;
    background: #111;
    color: rgba(255,255,255,0.75);
    font-size: 0.85rem;
  }
  .footer a { color: #fff; }

  .wa-float {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1500;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    padding: 0;
    background: #25d366;
    color: #fff;
    text-decoration: none;
    border-radius: 50%;

  .wa-float svg { width: 28px; height: 28px; display: block; }

  @media (max-width: 640px) {
    nav { padding: 14px 20px; }
    .projects-hero, .projects-wrap { padding-left: 20px; padding-right: 20px; }
    .nav-links { gap: 6px 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .reveal,
    .reveal-lines .line-inner {
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>

<script>
(function () {
  'use strict';
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  var nav = document.querySelector('nav');
  var lastScrollY = 0;
  var ticking = false;
  function updateNav() {
    var currentY = window.scrollY;
    if (nav) {
      if (currentY > lastScrollY && currentY > 100) {
        nav.classList.add('nav-hidden');
      } else {
        nav.classList.remove('nav-hidden');
      }
      if (currentY > 50) {
        nav.classList.add('nav-scrolled');
      } else {
        nav.classList.remove('nav-scrolled');
      }
    }
    lastScrollY = currentY;
    ticking = false;
  }
  window.addEventListener('scroll', function () {
    if (!ticking) {
      requestAnimationFrame(updateNav);
      ticking = true;
    }
  }, { passive: true });

  function updateScrollProgress() {
    var scrollTop = window.scrollY;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var progress = docHeight > 0 ? scrollTop / docHeight : 0;
    document.documentElement.style.setProperty('--scroll-total', progress);
  }
  window.addEventListener('scroll', updateScrollProgress, { passive: true });
  updateScrollProgress();

  var revealObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal, .reveal-lines').forEach(function (el) {
    revealObserver.observe(el);
  });

  var grid = document.getElementById('projects-grid');
  var btn = document.getElementById('projects-see-more');
  var done = document.getElementById('projects-done');
  if (btn && grid) {
    btn.setAttribute('aria-expanded', 'false');
    btn.setAttribute('aria-controls', 'projects-grid');
    btn.addEventListener('click', function () {
      grid.classList.add('is-expanded');
      btn.setAttribute('aria-expanded', 'true');
      var extras = grid.querySelectorAll('.project-slide--extra.reveal');
      extras.forEach(function (el, i) {
        el.classList.remove('visible');
      });
      requestAnimationFrame(function () {
        extras.forEach(function (el, i) {
          setTimeout(function () { el.classList.add('visible'); }, 40 + i * 45);
        });
      });
      if (done) {
        setTimeout(function () { done.classList.add('visible'); }, 120);
      }
    });
  }
})();
</script>
